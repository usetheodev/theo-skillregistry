services:
  pgvector:
    image: ankane/pgvector:v0.5.1
    container_name: theoskill_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-theoskill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-theoskill}
      POSTGRES_DB: ${POSTGRES_DB:-theoskill}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-theoskill}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
